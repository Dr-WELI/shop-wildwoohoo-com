<!--
  PRODUCT PAGE TEMPLATE - WildWooHoo Shop (Jekyll architecture)
  ============================================================================
  Reference file. Excluded from the build via _config.yml.

  HOW TO USE
  1. Copy this file to /_products/[product-slug].html
     Example: /_products/kangaroo-time-tee.html
  2. Replace all REPLACE-ME placeholders in the front matter and body.
  3. Set `category` to one of: childrens-books | educational | wear | prints
     | tools. That key is what makes the product appear on its category page.
  4. Drop product images into /assets/img/[product-slug]/ (7 images per
     shop immersion Insight 6; see _template/README.md for the slot order).
  5. The product page auto-builds at /products/[product-slug]/ via the
     product layout (see _layouts/product.html).
  6. Sitemap is auto-generated by jekyll-sitemap. Do not edit manually.
  7. Full editorial chain (writer -> reviewer -> chief-editor) before push.

  COMMERCE STATES (buy-state include reads these)
    availability: live | in_stock | preorder | out_of_stock
    checkout_url: Lemon Squeezy hosted-checkout URL. With availability: live
      it renders the real buy button (plain anchor without lemon.js, overlay
      when lemon.js loads). Without it, `live` renders a disabled button.
    fulfilment: digital | pod | inventory (AU spelling; the old key
      `fulfillment` is dead). Picks the tax line and delivery disclosure line.
    No scarcity counters, no urgency timers. The buy-state include enforces
    this; do not add countdown or low-stock copy in the body.

  TITLE CONVENTION (per Insight 4)
    WildWooHoo | [Product Name] | [Variant]
    Max 70 chars for the Google product card.

  META DESCRIPTION (per Insight 5)
    150-160 chars, hand-written. Pattern: [product type] + [one specificity
    competitor lacks] + [soft commitment: price, ships-from, or use-context].

  PRICING (per Insight 8)
    Round AU$ figures only. AU$45 not AU$44.99. Price renders ONLY in the
    buy panel - never in hero meta, never in body copy (per Insight 27).

  COPY LENGTH (per Insight 34)
    Tees / posters / stickers / totes: 80-120 words body copy.
    Zines / CDs / vinyl / books:       200-300 words body copy.

  SUSTAINABILITY (per Insights 2, 3, 7)
    Name the supplier / spec / certification inline. No vague claims.
    Acknowledge at least one limit inline if positioning as eco/sustainable.

  CHILDREN'S PRODUCTS (per Insight 23)
    Set age_band (and a safety list where it applies); the layout renders
    the safety note automatically via _includes/safety-note.html.

  AU CONSUMER LAW (per Insight 11)
    Arrives automatically via the policy strip (_includes/policy-strip.html)
    appended by the product layout. Do not duplicate here.
-->

<!-- ===== FRONT MATTER (copy this YAML block; do not include this comment) =====

---
# Layout (already defaulted in _config.yml - kept here for clarity)
layout: product

# Identity
title: REPLACE-ME Product Name
title_em: REPLACE-ME       # The italicised display word in the h1
title_prefix: REPLACE-ME   # Optional: e.g. "Kangaroo Time"
sku: REPLACE-ME-SKU
breadcrumb: Category - REPLACE-ME

# Catalogue placement
category: REPLACE-ME       # childrens-books | educational | wear | prints | tools
order: REPLACE-ME          # sort position in the category grid

# Pricing - never hard-code price in body copy (per Insight 27)
price: REPLACE-ME
price_compare_at: null     # Only for documented discounts (per Insight 21)

# Commerce state (see COMMERCE STATES above)
availability: preorder     # live | in_stock | preorder | out_of_stock
checkout_url: null         # Lemon Squeezy hosted-checkout URL; with availability: live this renders the buy button
fulfilment: pod            # digital | pod | inventory

# Hero
lede: REPLACE-ME opening 2-sentence paragraph. Noun phrase + locating context.
ships_from: Sydney, Australia

# Description
description: REPLACE-ME 150-160 char hand-written meta description.

# OG card
og_type: product
og_image: /assets/img/REPLACE-ME-product-slug/01-hero.jpg

# Schema.org Product markup
schema:
  "@context": https://schema.org
  "@type": Product
  name: REPLACE-ME Product Name
  sku: REPLACE-ME-SKU
  image:
    - https://shop.wildwoohoo.com/assets/img/REPLACE-ME-product-slug/01-hero.jpg
    - https://shop.wildwoohoo.com/assets/img/REPLACE-ME-product-slug/02-scale.jpg
    - https://shop.wildwoohoo.com/assets/img/REPLACE-ME-product-slug/03-detail.jpg
  brand:
    "@type": Brand
    name: WildWooHoo
  offers:
    "@type": Offer
    price: REPLACE-ME
    priceCurrency: AUD
    availability: https://schema.org/PreOrder

# Spec fields - product-meta.html renders whichever of these exist as the
# spec grid (format, files, size, licence, material, fit, made_in,
# ships_from, care). Do not hand-write them in body copy.
material: REPLACE-ME spec + supplier + certification
fit: REPLACE-ME sizing / scale
made_in: REPLACE-ME country + facility
care: REPLACE-ME specific care + sustainability rationale
weight_grams: REPLACE-ME
dimensions_mm: REPLACE-ME
eligible_regions:
  - AU
  - NZ

# Children's products only - safety-note.html renders these (per Insight 23)
age_band: null             # e.g. "7-8"
safety: null               # list: supervision, wash, small_parts

# Related products (manual, max 3, per Insight 35) - related-products.html
related:
  - title: REPLACE-ME related product name
    url: /products/REPLACE-ME-slug/
    reason: REPLACE-ME one line on why a buyer would care.

interest_hook: null        # only used on category pages
---

===== END FRONT MATTER ===== -->
