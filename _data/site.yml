# =============================================================================
# Site-wide brand + content data. Edit here once, propagates everywhere.
# =============================================================================

brand:
  name: WildWooHoo
  shop_name: WildWooHoo Shop
  tagline: A creative studio for the animal kingdom, including us.
  tagline_full: A creative studio for the animal kingdom, including us. Founded by Dr WELI in Sydney.
  abn: "61 239 662 726"
  city: Sydney
  country: Australia
  email: hello@wildwoohoo.com

# Brand chip image (header). alt stays empty: the brand anchor carries the
# accessible name.
chip:
  image: /assets/img/wwh-chip-green-112.png
  alt: ""

# Cut-edge wordmark (the trademark wordmark with the slot cuts on the W + final
# o). Replaces the chip in the header per the brand rule "mark OR wordmark,
# never both". The white variant is the discrete near-white watermark.
wordmark:
  image: /assets/img/wwh-wordmark.svg
  white: /assets/img/wwh-wordmark-white.svg

# Top announcement bar (the trust + offer strip every real store has). HONEST:
# the shop is pre-launch, so this is a genuine launch incentive tied to the
# register-interest capture, NOT fake scarcity. WELI: confirm you will honour
# the 15% launch offer; edit the wording here.
announcement:
  message: Register now and get 15% off your first order when the shop opens
  url: "mailto:hello@wildwoohoo.com?subject=Register%20interest%3A%2015%25%20launch%20offer&body=Tell%20me%20when%20the%20shop%20opens%20-%20I%20would%20like%20the%2015%25%20first-order%20offer."

# Floating launch-offer button (like the "Get 15% off" on trusted stores).
offer:
  label: 15% off at launch
  url: "mailto:hello@wildwoohoo.com?subject=Register%20interest%3A%2015%25%20launch%20offer&body=Tell%20me%20when%20the%20shop%20opens%20-%20I%20would%20like%20the%2015%25%20first-order%20offer."

# Currency shown in the header (the shop prices in AUD).
currency: "AUD $"

main_site:
  url: https://wildwoohoo.com
  label: Main site
  music_url: https://wildwoohoo.com/music-and-entertainment/
  research_url: https://wildwoohoo.com/wildwoohoo-x-weli/
  collaborate_url: https://wildwoohoo.com/collaborate/
  privacy_url: https://wildwoohoo.com/privacy/

# Opening plan. The landing hero meta and the launch timeline both render
# from here; when a date moves, edit it here once.
launch:
  status: Opening soon
  first_catalogue: Digital downloads, Q3 2026
  ships_from: Sydney, Australia
  phases:
    - num: "01"
      window: Q3 2026
      label: Digital downloads
      line: The shop opens with the Kangaroo Time classroom kit and the Kangaroo Time stems pack.
    - num: "02"
      window: Q4 2026
      label: Wear and prints
      line: The print-on-demand baseline of tees, hoodies, totes, posters and stickers.
    - num: "03"
      window: Q1 2027
      label: Books and companion
      line: The first Kangaroo Time slipcase set, with the free books companion.

# The on-shop policies destination page.
policies_url: /policies/

artist_site:
  url: https://drweli.com
  label: Dr WELI

social:
  - platform: Instagram
    handle: "@wildwoohoo"
    url: https://www.instagram.com/wildwoohoo/
  - platform: YouTube
    handle: "@wildwoohoo"
    url: https://www.youtube.com/@wildwoohoo
  - platform: TikTok
    handle: "@wildwoohoo"
    url: https://www.tiktok.com/@wildwoohoo

# Main site carries the full three-nations AoC. Divergence flagged for WELI
# 2026-06-12; do not change without sign-off.
acknowledgement: >
  WildWooHoo Studio works on the unceded lands of the Gadigal people of
  the Eora Nation. We acknowledge their continuing connection to land,
  waters and culture, and pay respect to Elders past and present.
