# Register-interest hooks. Each promise is an operational commitment: one
# email per hook when its catalogue opens, sent from the hello@ inbox,
# nothing else. Subjects double as inbox segmentation until a list platform
# lands (SHP-007).

promise: "One email when it opens. Nothing else."
fallback_lead: "No mail app? Write to"
fallback_mid: "with the subject"

hooks:
