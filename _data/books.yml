# =============================================================================
# Shared book data. Keeps every book + book-combo product page consistent.
#
# The book product model: WildWooHoo Books are short field-guide booklets
# (8 to 16 pages), sold as a four-booklet slipcase set (the hero product) and
# as single booklets. Grounded in named behavioural-ecology research, written
# for a 7 to 8 year-old reader, bilingual EN + PT.
#
# This is the locked model from the children's-books canonical docs at
# ~/Studio/Projects-In-The-Site/Childrens-Books/. If that model changes, edit
# here once and every book page follows.
# =============================================================================

imprint: WildWooHoo Books

# ---- Companion app -----------------------------------------------------------
# HYBRID model (WELI 2026-06-09): the child-facing core is FREE, code-unlocked,
# no subscription, collects nothing about the child. An OPTIONAL adult pack
# (parent + teacher) is sold separately and spans the series. The child side
# never upsells and never tracks the reader. Do not collapse this back into a
# child-facing subscription (it conflicts with the locked Production-Ethics
# framework + books-companion architecture).
companion:
  name: WildWooHoo Books companion
  url: https://companion.wildwoohoo.com

  # Free, child-facing, per booklet, unlocked by the printed code.
  free:
    model: >
      Every booklet carries a code inside the back cover. An adult enters it once
      to open that booklet's companion. The child-facing companion is free with
      the book, it is not a subscription, and it collects nothing about the child.
    includes:
      - Real recordings of the animals in the booklet.
      - Links to open-access video and the science behind each fact.
      - A where-to-see-it map built from open data.
      - The booklet's printed sources, linked.
      - Printable researcher notebook pages.
    promises:
      - No account, and no login for the child.
      - No data collected from children.
      - No streaks, points, or notifications.

  # Optional, adult-facing, sold separately, spans the whole series.
  extras:
    name: Parent and teacher pack
    model: >
      An optional pack for the grown-ups, sold separately, that spans the whole
      series. Bought and used by an adult. It never asks the child for an account
      and never tracks the reader.
    includes:
      - Curriculum-alignment notes for AU primary.
      - Lesson plans and classroom extension activities.
      - A parent guide with conversation prompts across the books.
      - The full cross-series citation chain in one place.
    note: >
      The child-facing companion stays free and data-free. The paid pack is an
      adult resource and never appears inside the child's companion. Pricing to
      confirm.

# ---- Production-ethics transparency -----------------------------------------
# Shown on every book page. The locked discipline made visible to the buyer.
ethics:
  heading: How this book treats your child
  points:
    - label: No data from children
      body: The booklet and its companion collect nothing about the reader.
    - label: Sends them outside
      body: Every booklet ends with something to do in the real world, away from a screen.
    - label: Cited to real research
      body: Every fact traces to named, published science. The sources are printed in the back.
    - label: Accessible by default
      body: Atkinson Hyperlegible type, generous spacing, plain language, EN and PT.

# ---- ICIP transparency -------------------------------------------------------
# Per locked LOCKED-DECISIONS 18.4. One of these lines prints on every book page.
icip:
  clean: >
    This booklet uses no First Nations knowledge or motifs. A future edition that
    draws on First Nations seasonal knowledge will be co-authored and credited
    with the community whose knowledge it is.
  co_authored: >
    Co-authored and credited with the First Nations community whose knowledge it
    carries, under a written ICIP agreement.
