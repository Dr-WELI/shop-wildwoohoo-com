# =============================================================================
# Jekyll config for shop.wildwoohoo.com
#
# Built 2026-06-08. Owner: WildWooHoo Studio.
#
# This file holds site-wide Jekyll settings. Brand / content data lives in
# _data/*.yml so editorial changes don't touch this file. To add a new
# category, create a file in _categories/. To add a new product, create a file
# in _products/ (books use layout: book, see _template/book-product.html). To
# change the nav, edit _data/nav.yml. Shared book data is in _data/books.yml.
# =============================================================================

title: WildWooHoo Shop
description: Books, educational materials, wear, prints and tools from WildWooHoo Studio. Founded by Dr WELI in Sydney.
url: https://shop.wildwoohoo.com
baseurl: ""
lang: en-AU
timezone: Australia/Sydney

# Author / brand
author:
  name: Dr WELI
  url: https://drweli.com
  email: hello@wildwoohoo.com

# Build
markdown: kramdown
highlighter: rouge
permalink: pretty
encoding: utf-8

# Plugins (must be on the github-pages allowlist:
# https://pages.github.com/versions/)
# jekyll-seo-tag is deliberately NOT used: _includes/head.html hand-rolls all
# meta, and running both would duplicate tags.
plugins:
  - jekyll-sitemap

# Collections
# NOTE: the 'categories' collection name shadows Jekyll's reserved
# site.categories (post-categories hash). Verified safe on Jekyll 3.10
# (SiteDrop#[] returns collection docs first). CONSTRAINT: this site must
# NEVER use posts or category-aware plugins. If that ever changes, rename
# this collection first.
collections:
  categories:
    output: true
    permalink: /categories/:path/
  products:
    output: true
    permalink: /products/:path/

# Defaults - applied to every file unless the front matter overrides
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: categories
    values:
      layout: category
  - scope:
      path: ""
      type: products
    values:
      layout: product

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - STRATEGY-SUMMARY.md
  - TODO.md
  - vendor/
  - node_modules/
  - _template/
